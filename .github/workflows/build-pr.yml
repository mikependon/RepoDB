name: Build & Run Tests for PR
on: 
  pull_request:

env:
  REPODB_SQLSVR_CONSTR_MASTER: "Server=tcp:127.0.0.1,41433;Database=master;User ID=sa;Password=RepoDB2026;TrustServerCertificate=True;"
  REPODB_SQLSVR_CONSTR: "Server=tcp:127.0.0.1,41433;Database=RepoDb;User ID=sa;Password=RepoDB2026;TrustServerCertificate=True;"
  REPODB_PGSQL_CONSTR_POSTGRES: "Server=127.0.0.1;Port=45432;Database=postgres;User Id=postgres;Password=RepoDB2026;"
  REPODB_PGSQL_CONSTR: "Server=127.0.0.1;Port=45432;Database=RepoDb;User Id=postgres;Password=RepoDB2026;"
  REPODB_MYSQL_CONSTR_SYSTEM: "Server=127.0.0.1;Port=43306;Database=sys;User ID=root;Password=RepoDB2026;"
  REPODB_MYSQL_CONSTR: "Server=127.0.0.1;Port=43306;Database=RepoDb;User ID=root;Password=RepoDB2026;"

jobs:
  build:
    runs-on: ubuntu-latest

    # Services. See docker-compose.yml
    services:
        mssql:
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - 127.0.0.1:1433:1433
          env:
            ACCEPT_EULA: true
            MSSQL_SA_PASSWORD: RepoDB2026
      
        postgresql:
          image: postgres:latest
          ports:
            - 127.0.0.1:5432:5432
          env:
            POSTGRES_PASSWORD: RepoDB2026
      
        mysql:
          image: mysql:latest
          ports:
            - 127.0.0.1:3306:3306
          env:
            MYSQL_ROOT_PASSWORD: RepoDB2026

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup .NET Versions
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: build
        run: dotnet build -c release RepoDb.Solutions.sln

      - name: test for .NET 8.0
        run: dotnet test -c release -f net8.0 --no-build -p:TestingPlatformDotnetTestSupport=true -p:TestingPlatformShowTestsFailure=true -p:TestingPlatformCaptureOutput=false RepoDb.Solutions.sln

      - name: pack packages
        run: dotnet pack -c release -p Version="1.14.0-dev-pr-${{ github.run_number }}" -o release RepoDb.Solutions.sln

      - name: Package nupkg files
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/*nupkg
