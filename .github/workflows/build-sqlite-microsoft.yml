name: Build & Run Tests - RepoDb.Sqlite.Microsoft (Push)

on:
  workflow_dispatch:
  push:
    paths:
      - 'RepoDb.Core/**'
      - 'RepoDb.Sqlite.Microsoft/**'
      - '.github/workflows/build-base.yml'
      - '.github/workflows/build-sqlite-microsoft.yml'

jobs:
  build:
    uses: ./.github/workflows/build-base.yml
    with:
      solution-dir: RepoDb.Sqlite.Microsoft
      solution-file: RepoDb.Sqlite.Microsoft.sln
      artifact-name: release-sqlite-microsoft
