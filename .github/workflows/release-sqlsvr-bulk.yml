name: Release - RepoDb.SqlServer.BulkOperations (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.14.0)"
        required: true
        type: string
  release:
    types: [published]

jobs:
  publish:
    uses: ./.github/workflows/release-base.yml
    with:
      version: ${{ inputs.version }}
      project-name: RepoDb.SqlServer.BulkOperations
      project-path: RepoDb.Extensions/RepoDb.SqlServer.BulkOperations/RepoDb.SqlServer.BulkOperations/RepoDb.SqlServer.BulkOperations.csproj
