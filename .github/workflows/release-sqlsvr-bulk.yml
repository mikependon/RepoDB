name: Release - RepoDb.SqlServer.BulkOperations (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.14.0)"
        required: true
        type: string
      dependency-overrides:
        description: "Semicolon-separated pins for dependencies not released at the same version this run, e.g. 'RepoDbCoreVersion=1.14.0;RepoDbSqlServerVersion=1.14.0'"
        required: false
        type: string
        default: ''
  release:
    types: [published]

jobs:
  publish:
    uses: ./.github/workflows/release-base.yml
    with:
      version: ${{ inputs.version }}
      dependency-overrides: ${{ inputs.dependency-overrides }}
      project-name: RepoDb.SqlServer.BulkOperations
      project-path: RepoDb.Extensions/RepoDb.SqlServer.BulkOperations/RepoDb.SqlServer.BulkOperations/RepoDb.SqlServer.BulkOperations.csproj
