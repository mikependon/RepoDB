name: Release - RepoDb.Telemetry.Default (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.14.0)"
        required: true
        type: string
      dependency-overrides:
        description: "Semicolon-separated pins for dependencies not released at the same version this run, e.g. 'RepoDbCoreVersion=1.14.0;RepoDbTelemetryCoreVersion=1.14.0'"
        required: false
        type: string
        default: ''
  release:
    types: [published]

jobs:
  publish:
    uses: ./.github/workflows/release-base.yml
    with:
      version: ${{ inputs.version }}
      dependency-overrides: ${{ inputs.dependency-overrides }}
      project-name: RepoDb.Telemetry.Default
      project-path: RepoDb.Telemetry.Default/RepoDb.Telemetry.Default.csproj
